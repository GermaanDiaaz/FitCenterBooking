<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
 	
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
    <title>FitCenterBooking</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

	<link rel="stylesheet"  href="../static/css/general.css" th:href="@{/css/general.css}">
</head>
<body class="bg-secondary">
	<div th:replace="~{fragments/general :: cabecera}"></div>

    <main class="mb-5">
        <div class="container bg-opacity-75 w-25 rounded-4 my-5 bg-dark p-2">
			<h1 class="text-center text-white">Listado Actividades</h1>
		</div>

        <div th:if="${#lists.isEmpty(listaActividades)}" class="w-50 mx-auto px-4 bg-dark bg-opacity-75 p-4 rounded-4">
            <h3 class="text-info mb-3 border-bottom border-secondary pb-2">
                <i class="bi bi-info-circle-fill me-2"></i>
                Actividades registradas
            </h3>                
            <div class="text-center py-5">                        
                <p class="lead text-secondary">No tienes ninguna actividad registrada todavía.</p>
                <a th:href="@{/actividades/nueva}" class="btn btn-outline-success rounded-pill mt-2 fw-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-plus-lg" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2Z"/></svg>
                    Añadir Actividad
                </a>
            </div>
        </div>

        <section th:if="${not (#lists.isEmpty(listaActividades))}">
            <div class="w-75 mx-auto px-4 mb-3 d-flex justify-content-end">
                <a th:href="@{/actividades/nueva}" class="btn btn-success btn-outline-dark text-white d-flex align-items-center gap-2 rounded-3 px-3 py-2 fw-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-plus-lg" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2Z"/></svg>
                    Añadir Actividad
                </a>
            </div>

            <div class="w-75 mx-auto px-4">
                <div class="p-4 rounded-4 bg-dark bg-opacity-75 text-white shadow">

                    <div th:if="${error}" class="bg-danger d-inline-block rounded-3 py-2 px-3 mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-exclamation-triangle-fill me-2" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5m.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/></svg>
                        <span class="fw-bold" th:text="${error}">Mensaje de error</span>
                    </div>

                    <table class="table table-dark table-striped table-hover align-middle mb-0">
                        <thead>
                            <tr class="border-bottom border-secondary">
                                <th class="py-3 ps-3 text-info">Imagen</th>
                                <th class="py-3 text-info">id</th>
                                <th class="py-3 text-info">nombre</th>
                                <th class="py-3 text-info">capacidad</th>
                                <th class="py-3 text-info">precio</th>
                                <th class="py-3 pe-3 text-center text-info">Operaciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="actividad : ${listaActividades}">
                                <td class="py-3 ps-3 w-auto">
                                    <img th:src="${not (#strings.isEmpty(actividad.imagenUrl))} ? ${actividad.imagenUrl} : @{/img/Defecto.png}" 
                                        th:alt="${actividad.nombre}" class="rounded-3">
                                </td>
                                <td class="py-3" th:text="${actividad.id}">admin@admin.com</td>
                                <td class="py-3" th:text="${actividad.nombre}">600 111 222</td>
                                <td class="py-3" th:text="${actividad.capacidad + ' personas'}">Admin</td>
                                <td class="py-3" th:text="${#numbers.formatDecimal(actividad.precio, 1, 2) + '€'}">Admin</td>

                                <td class="py-3 pe-3">
                                    <div class="d-flex justify-content-center gap-2">
                                        <a th:href="@{/actividades/editar/{id}(id=${actividad.id})}" class="btn btn-sm btn-outline-success px-3">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil-fill" viewBox="0 0 16 16"><path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z"/></svg>
                                            Editar
                                        </a>
                                        <a th:if="${not (#strings.isEmpty(actividad.id))}" th:href="@{/actividades/eliminar/{id}(id=${actividad.id})}" class="btn btn-sm btn-outline-danger px-3">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash-fill" viewBox="0 0 16 16"><path d="M2.5 1a1 1 0 0 0-1 1v1a1 1 0 0 0 1 1H3v9a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V4h.5a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H10a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1zm3 4a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 .5-.5M8 5a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7A.5.5 0 0 1 8 5m3 .5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 1 0"/></svg>
                                            Eliminar
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
        

    </main>
    <div th:replace="~{fragments/general :: pie}"></div>
	
</body>
</html>
