<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
 	
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
    <title>FitCenterBooking</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
	<link rel="stylesheet"  href="../static/css/general.css" th:href="@{/css/general.css}">
</head>
<body class="bg-secondary">
	<div th:replace="~{fragments/general :: cabecera}"></div>

    <main class="mb-5">
        <div class="container bg-opacity-75 w-25 rounded-4 my-5 bg-dark p-2 sombra">
			<h1 class="text-center text-white">Listado Actividades</h1>
		</div>

        <div th:if="${#lists.isEmpty(listaActividades)}" class="w-50 mx-auto px-4 bg-dark bg-opacity-75 p-4 rounded-4 sombra">
            <h3 class="text-info mb-3 border-bottom border-secondary pb-2">
                Actividades registradas
            </h3>                
            <div class="text-center py-5">                        
                <p class="lead text-secondary">No tienes ninguna actividad registrada todavía.</p>
                <a th:href="@{/actividades/nueva}" class="btn btn-outline-success rounded-pill mt-2 fw-bold d-inline-flex align-items-center pe-3 justify-content-center">
                    <i class="bi bi-plus fs-3 me-1"></i>
                    Añadir Actividad
                </a>
            </div>
        </div>

        <section th:if="${not (#lists.isEmpty(listaActividades))}">
            <div class="w-75 mx-auto px-4 mb-3 d-flex justify-content-end">
                <a th:href="@{/actividades/nueva}" class="btn btn-success btn-outline-dark text-white d-flex align-items-center gap-2 rounded-3 px-2 py-0 fw-bold">
					<i class="bi bi-plus fs-3 my-auto"></i>
                    Añadir Actividad
                </a>
            </div>

            <div class="w-75 mx-auto px-4">
                <div class="p-4 rounded-4 bg-dark bg-opacity-75 text-white sombra">

                    <div th:if="${error}" class="bg-danger d-inline-block rounded-3 py-2 px-3 mb-3">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span class="fw-bold" th:text="${error}">Mensaje de error</span>
                    </div>

                    <table class="table table-dark table-striped table-hover align-middle mb-0">
                        <thead>
                            <tr class="border-bottom border-secondary">
                                <th class="py-3 ps-3 text-info">Imagen</th>
                                <th class="py-3 text-info">id</th>
                                <th class="py-3 text-info">nombre</th>
                                <th class="py-3 text-info">capacidad</th>
                                <th class="py-3 text-info">precio</th>
                                <th class="py-3 pe-3 text-center text-info">Operaciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="actividad : ${listaActividades}">
                                <td class="py-3 ps-3 w-auto">
                                    <img th:src="${not (#strings.isEmpty(actividad.imagenUrl))} ? ${actividad.imagenUrl} : @{/img/Defecto.png}" 
                                        th:alt="${actividad.nombre}" class="rounded-3">
                                </td>
                                <td class="py-3" th:text="${actividad.id}">admin@admin.com</td>
                                <td class="py-3" th:text="${actividad.nombre}">600 111 222</td>
                                <td class="py-3" th:text="${actividad.capacidad + ' personas'}">Admin</td>
                                <td class="py-3" th:text="${#numbers.formatDecimal(actividad.precio, 1, 2) + '€'}">Admin</td>

                                <td class="py-3 pe-3">
                                    <div class="d-flex justify-content-center gap-2">
                                        <a th:href="@{/actividades/editar/{id}(id=${actividad.id})}" class="btn btn-sm btn-outline-success px-3">
                                            <i class="bi bi-pencil-fill"></i>
                                            Editar
                                        </a>
                                        <a th:if="${not (#strings.isEmpty(actividad.id))}" th:href="@{/actividades/eliminar/{id}(id=${actividad.id})}" 
                                            onclick="return confirm('¿Estás seguro de que deseas eliminar esta actividad?');"
                                            class="btn btn-sm btn-outline-danger px-3">
                                            <i class="bi bi-trash-fill"></i>
                                            Eliminar
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
        

    </main>
    <div th:replace="~{fragments/general :: pie}"></div>
	
</body>
</html>
