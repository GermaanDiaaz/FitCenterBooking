<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
 	
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
    <title>FitCenterBooking</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
	<link rel="stylesheet"  href="../static/css/general.css" th:href="@{/css/general.css}">
</head>
<body class="bg-secondary">
	<div th:replace="~{fragments/general :: cabecera}"></div>

    <main class="mb-5">
        <div class="container bg-opacity-75 w-25 rounded-4 my-5 bg-dark p-2 sombra">
			<h1 class="text-center text-white">Listado Reservas</h1>
		</div>

        <div th:if="${#lists.isEmpty(listaReservas)}" class="w-50 mx-auto px-4 bg-dark bg-opacity-75 p-4 rounded-4 sombra">
            <h3 class="text-info mb-3 border-bottom border-secondary pb-2">
                Reservas registradas
            </h3>                
            <div class="text-center py-5">                        
                <p class="lead text-secondary">No tienes ninguna reserva registrada todavía.</p>
                <a th:href="@{/carrito}" class="btn btn-outline-info rounded-pill mt-2">Ver Carrito</a>
            </div>
        </div>

        <div th:if="${not (#lists.isEmpty(listaReservas))}" class="w-75 mx-auto px-4">
            <div class="p-4 rounded-4 bg-dark bg-opacity-75 text-white sombra">
                <table class="table table-dark table-striped table-hover align-middle mb-0">
                    <thead>
                        <tr class="border-bottom border-secondary">
                            <th class="py-3 ps-3 text-info">Código</th>
                            <th class="py-3 text-info">Fecha</th>
                            <th class="py-3 text-info">Precio</th>
                            <th class="py-3 text-info">Usuario</th>
                            <th class="py-3 text-info">Actividades</th>
                            <th class="py-3 text-info">Estados</th>
                            <th class="py-3 pe-3 text-center text-info">Operaciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="reserva : ${listaReservas}">
                            <td class="py-3 ps-3" th:text="${reserva.codigo}">Codigo</td>
                            <td class="py-3" th:text="${#temporals.format(reserva.fecha, 'dd/MM/yyyy HH:mm')}">02/06/2026 19:30</td>
                            <td class="py-3" th:text="${#numbers.formatDecimal(reserva.precioTotal, 1, 2)} + '€'">15.50€</td>
                            <td class="py-3" th:text="${reserva.usuario.nombre}">Nombre</td>
                            <td class="py-3">
                                <ul class="list-unstyled mb-0">
                                    <li th:each="linea : ${reserva.actividades}" th:text="${linea.actividad.nombre}">
                                        Yoga
                                    </li>
                                </ul>
                            </td>
                            <td class="py-3">
                                <ul class="list-unstyled mb-0">
                                    <li th:each="linea : ${reserva.actividades}" th:text="${linea.estado}">
                                        Estado
                                    </li>
                                </ul>
                            </td>

                            <td class="py-3 pe-3">
                                <div class="d-flex justify-content-center gap-2">
                                    <a th:href="@{/reservas/editar/{codigo}(codigo=${reserva.codigo})}" class="btn btn-sm btn-outline-success px-3">
                                        <i class="bi bi-pencil-fill"></i>
                                        Editar
                                    </a>
                                    <a th:href="@{/reservas/eliminar/{codigo}(codigo=${reserva.codigo})}" 
                                        onclick="return confirm('¿Estás seguro de que deseas eliminar esta reserva?');"    
                                        class="btn btn-sm btn-outline-danger px-3">
                                        <i class="bi bi-trash-fill"></i>
                                        Eliminar
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
	<div th:replace="~{fragments/general :: pie}"></div>

</body>
</html>
