<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
 	
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
    <title>FitCenterBooking</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

	<link rel="stylesheet"  href="../static/css/general.css" th:href="@{/css/general.css}">
</head>
<body class="bg-secondary">
	<div th:replace="~{fragments/general :: cabecera}"></div>

    <main class="mb-5">
        <div class="container bg-opacity-75 w-25 rounded-pill my-5 bg-dark p-2">
			<h1 class="text-center text-white">Listado Reservas</h1>
		</div>
        <div class="w-75 mx-auto px-4">
            <div class="p-4 rounded-4 bg-dark bg-opacity-75 text-white shadow">
                <table class="table table-dark table-striped table-hover align-middle mb-0">
                    <thead>
                        <tr class="border-bottom border-secondary">
                            <th class="py-3 ps-3 text-info">Código</th>
                            <th class="py-3 text-info">Fecha</th>
                            <th class="py-3 text-info">Precio</th>
                            <th class="py-3 text-info">Usuario</th>
                            <th class="py-3 pe-3 text-center text-info">Operaciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="reserva : ${listaReservas}">
                            <td class="py-3 ps-3" th:text="${reserva.codigo}">admin</td>
                            <td class="py-3" th:text="${reserva.fecha}">admin@admin.com</td>
                            <td class="py-3" th:text="${reserva.precio}">600 111 222</td>
                            <td class="py-3" th:text="${reserva.usuario}">Admin</td>
                            <td class="py-3 pe-3">
                                <div class="d-flex justify-content-center gap-2">
                                    <a href="#" class="btn btn-sm btn-outline-success px-3">Editar</a>
                                    <a href="#" class="btn btn-sm btn-outline-danger px-3">Eliminar</a>
                                </div>
                            </td>
                        </tr>
                        
                    </tbody>
                </table>
            </div>
        </div>

    </main>
	
</body>
</html>
