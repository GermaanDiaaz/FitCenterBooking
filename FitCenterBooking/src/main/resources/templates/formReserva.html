<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
 	
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
    <title>FitCenterBooking</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

	<link rel="stylesheet"  href="../static/css/general.css" th:href="@{/css/general.css}">

    <script th:src="@{/js/validaciones.js}" defer></script>

</head>
<body class="bg-secondary">
	<div th:replace="~{fragments/general :: cabecera}"></div>

    <main class="mb-5">
        <div class="container bg-opacity-75 w-25 rounded-4 my-5 bg-dark p-2">
			<h1 class="text-center text-white">Editar Reserva</h1>
		</div>
        <div class="w-50 mx-auto px-4">
            <div class="card py-3 px-4 rounded-4 bg-dark bg-opacity-75 text-white">
                <form method="POST" th:action="@{''}" th:object="${reserva}" class="needs-validation" novalidate>

                    <input type="hidden" th:field="*{codigo}">

                    <div class="d-flex gap-4">
                        <div class="mb-4 mt-3 flex-fill">
                            <label for="fecha" class="form-label mb-3 fs-5">Fecha: *</label>
                            <input type="datetime-local" class="form-control form-control-lg" id="fecha" th:field="*{fecha}" 
                                th:classappend="${#fields.hasErrors('fecha')} ? 'is-invalid'" required>
                            <div class="invalid-feedback" th:if="${!#fields.hasErrors('fecha')}">La fecha y hora seleccionadas no pueden ser pasadas o estar vacías.</div>
    
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></div>
                        </div>
                        <div class="mb-4 mt-3 flex-fill">
                            <label for="precioTotal" class="form-label mb-3 fs-5">Precio Total:</label>
                            <p class="form-control form-control-lg bg-secondary bg-opacity-75 text-white" 
                                th:text="${#numbers.formatDecimal(reserva.precioTotal, 1, 2)} + '€'">
                            </p>
                        </div>
                    </div>
                    <div sec:authorize="hasRole('ADMIN')" class="mb-4 me-5">
                        <label for="usuario" class="form-label mb-3 fs-5">Cliente Asignado: *</label>
                        <select class="form-select form-select-lg" id="usuario" name="usuarioId" required>
                            <option th:each="u : ${usuarios}" th:value="${u.id}" th:text="${u.nombre + ' (' + u.email + ')'}" 
                                th:selected="${reserva.usuario != null and u.id == reserva.usuario.id}">
                                El Ger (ger@ger.com)
                            </option>
                        </select>
                        <div class="invalid-feedback">Debes asignar un cliente a la reserva.</div>
                    </div>

                    <div sec:authorize="hasRole('CLIENTE')" class="mb-4 me-5">
                        <label for="usuario" class="form-label mb-3 fs-5">Cliente Asignado:</label>
                        <p class="form-select form-select-lg bg-secondary bg-opacity-75 text-white" 
                            th:text="${reserva.usuario?.nombre + ' (' + reserva.usuario?.email + ')'}">
                            El Ger (ger@ger.com)
                        </p>
                    </div>

                    <button type="submit" class="btn btn-info d-block mx-auto mb-3 mt-5 w-75 py-2">
                        Editar Reserva
                    </button>
                </form>
            </div>
        </div>

    </main>
	
	<div th:replace="~{fragments/general :: pie}"></div>
</body>
</html>
