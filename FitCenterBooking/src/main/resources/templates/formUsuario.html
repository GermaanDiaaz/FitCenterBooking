<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
 	
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
    <title>FitCenterBooking</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

	<link rel="stylesheet"  href="../static/css/general.css" th:href="@{/css/general.css}">

    <script th:src="@{/js/validaciones.js}" defer></script>

</head>
<body class="bg-secondary">
	<div th:replace="~{fragments/general :: cabecera}"></div>

    <main class="mb-5">
        <div class="container bg-opacity-75 w-25 rounded-4 my-5 bg-dark p-2 sombra">
			<h1 class="text-center text-white">Editar Usuario</h1>
		</div>
        <div class="w-50 mx-auto px-4">
            <div class="card py-3 px-4 rounded-4 bg-dark bg-opacity-75 text-white sombra">
                <form method="POST" th:action="@{/usuarios/editar}" th:object="${usuario}" class="needs-validation" novalidate>

                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{password}"> 
                    <input type="hidden" th:field="*{rol}">

                    <div class="mb-4 mt-3">
                        <label for="nombre" class="form-label mb-3 fs-5">Nombre: *</label>
                        <input type="text" class="form-control form-control-lg" id="nombre" placeholder="Introduzca el nombre del usuario. . ." th:field="*{nombre}" required
                            minlength="1" maxlength="20">
                        <div class="invalid-feedback">El nombre debe tener entre 1 y 20 caracteres.</div>
                    </div>
                    <div class="mb-4">
                        <label for="descripcion" class="form-label mb-3 fs-5">Correo @: *</label>
                        <input type="email" class="form-control form-control-lg" id="email" placeholder="Introduzca el correo electrónico. . ." th:field="*{email}" 
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" required>
                        <div class="invalid-feedback" th:if="${!#fields.hasErrors('email')}">Introduzca un correo electrónico válido.</div>
    
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    <div class="mb-4">
                        <label for="precio" class="form-label mb-3 fs-5">Teléfono: *</label>
                        <input type="text" class="form-control form-control-lg" id="telefono" placeholder="Introduzca el número de teléfono. . ." th:field="*{telefono}" required 
                            pattern="^[0-9]{9}$">
                        <div class="invalid-feedback">El teléfono debe tener 9 números.</div>
                    </div>
                    
                    <button type="submit" class="btn btn-info d-block mx-auto my-3 w-75"
                        onclick="return confirm('¿Estás seguro de que deseas editar este usuario?');">
                        Guardar Cambios
                    </button>
                </form>
            </div>
        </div>

    </main>
	
	<div th:replace="~{fragments/general :: pie}"></div>
</body>
</html>
