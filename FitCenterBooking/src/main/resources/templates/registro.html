<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
 	
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
    <title>FitCenterBooking</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

	<link rel="stylesheet"  href="../static/css/general.css" th:href="@{/css/general.css}">
</head>
<body class="bg-secondary">
	<div th:replace="~{fragments/general :: cabecera}"></div>

    <main class="mb-5">
        <div class="container bg-opacity-75 w-25 rounded-pill my-5 bg-dark p-2">
			<h1 class="text-center text-white">Registro de usuario</h1>
		</div>
        <div class="w-50 mx-auto px-4">
            <div class="card py-3 px-4 rounded-4 bg-dark bg-opacity-75 text-white">
                <form method="POST" th:action="@{/registro}" th:object="${usuario}">
                    <div class="mb-4 mt-3">
                        <label for="nombre" class="form-label mb-3 fs-5">Nombre:</label>
                        <input type="text" class="form-control form-control-lg" id="nombre" placeholder="Introduzca su nombre. . ." th:field="*{nombre}">
                    </div>
                    <div class="mb-4">
                        <label for="email" class="form-label mb-3 fs-5">Correo @:</label>
                        <input type="email" class="form-control form-control-lg" id="email" placeholder="Introduzca su email. . ." th:field="*{email}">
                    </div>
                    <div class="mb-4">
                        <label for="telefono" class="form-label mb-3 fs-5">Teléfono:</label>
                        <input type="text" class="form-control form-control-lg" id="telefono" placeholder="Introduzca su número de teléfono. . ." th:field="*{telefono}">
                    </div>
                    <div class="mb-4">
                        <label for="pwd" class="form-label mb-3 fs-5">Contraseña:</label>
                        <input type="password" class="form-control form-control-lg" id="pwd" placeholder="Introduzca su contraseña. . ." th:field="*{password}">
                    </div>

                    <div class="d-flex my-3">
                        <p>¿Ya tienes cuenta?</p>
                        <a class="ms-2 link-info" th:href="@{/login}">Inicia sesión aquí</a>
                    </div>
                    
                    <div class="text-center mb-3">
                        <button type="submit" class="btn btn-info px-5">Registrarme</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="w-50 d-flex mt-3 mx-auto">
            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="currentColor" class="bi bi-circle-fill my-auto me-2 ms-5" viewBox="0 0 16 16"><circle cx="8" cy="8" r="8"/></svg>
            <p class="mb-0 small fw-medium">Acceso 24/7 a tus reservas.</p>
        </div>
		<div class="w-50 d-flex mt-3 mx-auto">
	        <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="currentColor" class="bi bi-circle-fill my-auto me-2 ms-5" viewBox="0 0 16 16"><circle cx="8" cy="8" r="8"/></svg>
	        <p class="mb-0 small fw-medium">Acceso a información adicional sobre las actividades.</p>
	    </div>
    </main>
	
	<div th:replace="~{fragments/general :: pie}"></div>
</body>
</html>
