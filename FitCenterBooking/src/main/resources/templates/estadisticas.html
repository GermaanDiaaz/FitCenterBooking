<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
 	
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
    <title>FitCenterBooking</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet"  href="../static/css/general.css" th:href="@{/css/general.css}">
</head>
<body class="bg-secondary">
	<div th:replace="~{fragments/general :: cabecera}"></div>

	<main>
		<div class="container bg-opacity-75 w-50 rounded-4 my-5 bg-dark p-2 sombra">
            <h1 class="text-center text-white">Estadísticas Generales</h1>
        </div>

        <div class="w-75 mx-auto px-4 mb-5">
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="p-4 rounded-4 bg-dark bg-opacity-75 text-white card-hover h-100 text-center">
                        <h3 class="text-info border-bottom border-secondary pb-3 mb-4">Usuarios Activos</h3>
                        <h1 class="display-1 fw-bold mt-2" th:text="${usuariosActivos}">0</h1>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="p-4 rounded-4 bg-dark bg-opacity-75 text-white card-hover h-100 text-center">
                        <h3 class="text-info border-bottom border-secondary pb-3 mb-4">Top Actividades</h3>
                        
                        <p th:if="${#lists.isEmpty(actividadesPopulares)}" class="text-secondary mt-4 fs-5">Aún no hay reservas.</p>
                        
                        <ul th:if="${not #lists.isEmpty(actividadesPopulares)}" class="list-unstyled mt-4 fs-4">
                            <li th:each="act, iter : ${actividadesPopulares}" class="mb-3">
                                <span class="text-info fw-bold" th:text="${iter.count} + 'º'">1º</span> 
                                <span th:text="${'- ' + act.nombre}">Crossfit</span>
                                <span class="text-white-50 fs-6" th:text="' (' + ${plazasOcupadas[act.id]} + ' reservas)'"> (0 reservadas)</span>
                            </li>
                        </ul>
                    </div>
                </div>
                
            </div>
        </div>

        <div class="w-75 mx-auto px-4">
            <div class="p-4 rounded-4 bg-dark bg-opacity-75 text-white sombra">
                <h3 class="text-info mb-4 border-bottom border-secondary pb-3">Historial de Reservas</h3>
                
                <table class="table table-dark table-striped table-hover align-middle mb-0 text-center">
                    <thead>
                        <tr class="border-bottom border-secondary">
                            <th class="py-3 ps-3 text-info">Código</th>
                            <th class="py-3 text-info">Fecha</th>
                            <th class="py-3 text-info">Usuario</th>
                            <th class="py-3 text-info">Precio</th>
                            <th class="py-3 pe-3 text-info">Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="res : ${reservasOrdenadas}">
                            <td class="py-3 ps-3" th:text="${res.codigo}">1</td>
                            <td class="py-3" th:text="${#temporals.format(res.fecha, 'dd/MM/yyyy - HH:mm')}">01/01/2026</td>
                            <td class="py-3" th:text="${res.usuario.nombre + ' (' + res.usuario.email + ')'}">Usuario</td>
                            <td class="py-3" th:text="${#numbers.formatDecimal(res.precioTotal, 1, 2)} + '€'">0.00€</td>
                            <td class="py-3 pe-3" th:text="${res.fecha.isAfter(#temporals.createNow()) ? 'RESERVADA' : 'REALIZADA'}">ESTADO</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(reservasOrdenadas)}">
                            <td colspan="5" class="text-center text-secondary py-4 fs-5">No hay reservas registradas.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
	</main>

	<div th:replace="~{fragments/general :: pie}"></div>
</body>
</html>
