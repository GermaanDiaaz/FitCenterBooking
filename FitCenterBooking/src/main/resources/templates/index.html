<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
 	
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
    <title>FitCenterBooking</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

	<link rel="stylesheet"  href="../static/css/general.css" th:href="@{/css/general.css}">
</head>
<body class="bg-secondary">
	<div th:replace="~{fragments/general :: cabecera}"></div>

	<main>
		<div class="container bg-opacity-75 w-50 rounded-pill my-3 bg-dark p-2">
			<h1 class="text-center text-white">Nuestras Actividades</h1>
		</div>
		
		<div class="row justify-content-center g-4 m-3">
			<!--<div class="col-4 container-fluid rounded-4 bg-warning">
				<h1 class="text-center" th:text="${nombre}">Yoga</h1>
				<span class="fs-4 fw-bold text-primary ms-4 mb-3" th:text="${capacidad}">25</span>
				<span class="fs-4 fw-bold text-primary ms-4 mb-3" th:text="${#numbers.formatDecimal(precio, 1, 2)+' €'}">10€</span>
			</div>-->
			
			<div class="col-md-4 px-4">
				<div class="card py-3 px-4 rounded-4 bg-dark bg-opacity-75 text-white text-center">
					<h2 class="mb-3 text-info">Yoga</h2>
					<img th:src="@{/img/Yoga.png}" alt="Yoga" class="rounded-4 mb-3 w-100 h-100 mx-auto">
					<p class="fw-bold mb-1">Capacidad: 25</p>
					<p class="fw-bold mb-0">10€/sesión</p>
					<button type="button" class="btn btn-outline-light mx-auto my-3 w-75">Ver Detalles y Reservar</button>
				</div>
			</div>

			<div class="col-md-4 px-4">
				<div class="card py-3 px-4 rounded-4 bg-dark bg-opacity-75 text-white text-center">
					<h2 class="mb-3 text-info">Crossfit</h2>
					<img th:src="@{/img/Crossfit.png}" alt="Crossfit" class="rounded-4 mb-3 w-100 h-100 mx-auto">
					<p class="fw-bold mb-1">Capacidad: 20</p>
					<p class="fw-bold mb-0">12,50€/sesión</p>

					<button type="button" class="btn btn-outline-light mx-auto my-3 w-75">Ver Detalles y Reservar</button>
				</div>
			</div>
			
			<div class="col-md-4 px-4">
				<div class="card py-3 px-4 rounded-4 bg-dark bg-opacity-75 text-white text-center">
					<h2 class="mb-3 text-info">Natación</h2>
					<img th:src="@{/img/Natacion.png}" alt="Natación" class="rounded-4 mb-3 w-100 h-100 mx-auto">
					<p class="fw-bold mb-1">Capacidad: 20</p>
					<p class="fw-bold mb-0">15,25€/sesión</p>
					<button type="button" class="btn btn-outline-light mx-auto my-3 w-75">Ver Detalles y Reservar</button>
				</div>
			</div>
		</div>
	</main>

	<div th:replace="~{fragments/general :: pie}"></div>
</body>
</html>
