<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
 	
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
    <title>FitCenterBooking</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
	<link rel="stylesheet"  href="../static/css/general.css" th:href="@{/css/general.css}">
</head>
<body class="bg-secondary">
	<div th:replace="~{fragments/general :: cabecera}"></div>

    <main class="mb-5">
        <div class="container bg-opacity-75 w-25 rounded-4 my-5 bg-dark p-2 sombra">
			<h1 class="text-center text-white">Usuarios Registrados</h1>
		</div>
        <div class="w-75 mx-auto px-4">
            <div class="p-4 rounded-4 bg-dark bg-opacity-75 text-white sombra">
                <div th:if="${error}" class="bg-danger d-inline-block rounded-3 py-2 px-3 mb-3">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span class="fw-bold text-light text-center m-0" th:text="${error}"></span>
                </div>

                <div th:if="${errorUsuario}" class="bg-danger d-inline-block rounded-3 py-2 px-3 mb-3">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span class="fw-bold text-light text-center m-0" th:text="${errorUsuario}"></span>
                </div>

                <table class="table table-dark table-striped table-hover align-middle mb-0">
                    <thead>
                        <tr class="border-bottom border-secondary">
                            <th class="py-3 ps-3 text-info">Nombre</th>
                            <th class="py-3 text-info">Correo</th>
                            <th class="py-3 text-info">Teléfono</th>
                            <th class="py-3 text-info">Rol</th>
                            <th class="py-3 pe-3 text-center text-info">Operaciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="usuario : ${listaUsuarios}">
                            <td class="py-3 ps-3" th:text="${usuario.nombre}">admin</td>
                            <td class="py-3" th:text="${usuario.email}">admin@admin.com</td>
                            <td class="py-3" th:text="${usuario.telefono}">600 111 222</td>
                            <td class="py-3" th:text="${usuario.rol}">Admin</td>
                            <td class="py-3 pe-3">
                                <div class="d-flex justify-content-center gap-2">
                                    <a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}" class="btn btn-sm btn-outline-success px-3">
                                        <i class="bi bi-pencil-fill"></i>
                                        Editar
                                    </a>
                                    <a th:href="@{/usuarios/eliminar/{id}(id=${usuario.id})}" 
                                        onclick="return confirm('¿Estás seguro de que deseas eliminar este usuario?');"    
                                        class="btn btn-sm btn-outline-danger px-3">
                                        <i class="bi bi-trash-fill"></i>
                                        Eliminar
                                    </a>
                                </div>
                            </td>
                        </tr>
                        
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <div th:replace="~{fragments/general :: pie}"></div>

</body>
</html>
