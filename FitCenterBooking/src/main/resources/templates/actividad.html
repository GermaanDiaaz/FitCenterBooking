<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
 	
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
    <title>FitCenterBooking</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

	<link rel="stylesheet"  href="../static/css/general.css" th:href="@{/css/general.css}">
</head>
<body class="bg-secondary">
	<div th:replace="~{fragments/general :: cabecera}"></div>

	<main class="mb-5">
        <div class="container text-center my-5">
            <div class="d-inline-block bg-dark bg-opacity-75 px-5 py-2 rounded-pill shadow">
                <h1 class="text-white m-0 fw-bold" th:text="${actividad.nombre}">Yoga</h1>
            </div>
        </div>
        
        <div class="container mx-auto px-4">
            <div class="row g-4">
                
                <div class="col-lg-8">
                    <div class="card p-4 rounded-4 bg-dark bg-opacity-75 text-white h-100 shadow border-0">
                        <h3 class="text-info mb-3 border-bottom border-secondary pb-2">
                            <i class="bi bi-info-circle-fill me-2"></i>Sobre la actividad
                        </h3>
                        <p class="lead lh-base" th:text="${actividad.descripcion}">
                            Descripción
                        </p>
                        
                        <div class="w-50 mt-4 mx-auto">
                            <img th:src="${not (#strings.isEmpty(actividad.imagenUrl))} ? ${actividad.imagenUrl} : @{/img/Defecto.png}" 
                            th:alt="${actividad.nombre}" class="w-100 h-100 rounded-3"></img> 
                        </div>
                    </div>
                </div>
                
                <div class="col-lg-4">
                    <div class="card p-4 rounded-4 bg-dark bg-opacity-75 text-white">
                        <h4 class="text-info mb-4 border-bottom border-secondary pb-2">Información Clave</h4>
                        
                        <div class="mb-4">
                            <div class="d-flex align-items-center mb-3">
                                <div class="text-info rounded pb-2 me-3">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="currentColor" class="bi bi-circle-fill my-auto" viewBox="0 0 16 16"><circle cx="8" cy="8" r="8"/></svg>
                                </div>
                                <div>
                                    <h5 class="text-white-50 mb-2">Aforo:</h5>
                                    <p class="fw-bold fs-5">
                                        5
                                        <span th:text="${'/' + actividad.capacidad}">25</span>
                                    </p>
                                </div>
                            </div>
                            
                            <div class="d-flex align-items-center mb-3">
                                <div class="text-info rounded pb-2 me-3">
									<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="currentColor" class="bi bi-circle-fill my-auto" viewBox="0 0 16 16"><circle cx="8" cy="8" r="8"/></svg>
                                </div>
                                <div>
                                    <h5 class="text-white-50">Duración:</h5>
                                    <p class="fw-bold fs-5">1h</p>
                                </div>
                            </div>

                            <div class="d-flex align-items-center mb-3">
                                <div class="text-info rounded pb-2 me-3">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="currentColor" class="bi bi-circle-fill my-auto" viewBox="0 0 16 16"><circle cx="8" cy="8" r="8"/></svg>
                                </div>
                                <div>
                                    <h5 class="text-white-50">Precio/Sesión:</h5>
                                    <p class="fw-bold fs-5" th:text="${#numbers.formatDecimal(actividad.precio, 1, 2) + '€'}">10€</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="d-grid mt-4">
                            <a href="#" class="btn btn-info btn-lg rounded-pill fw-bold py-2">Reservar Plaza</a>
                        </div>
                    </div>
                </div>
                
            </div>
		</div>
	</main>
	<div th:replace="~{fragments/general :: pie}"></div>
</body>
</html>
