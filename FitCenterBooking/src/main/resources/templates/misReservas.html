<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
 	
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
    <title>FitCenterBooking</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

	<link rel="stylesheet"  href="../static/css/general.css" th:href="@{/css/general.css}">
</head>
<body class="bg-secondary">
	<div th:replace="~{fragments/general :: cabecera}"></div>

    <main class="mb-5">
        <div class="container bg-opacity-75 w-25 rounded-pill my-5 bg-dark p-2">
			<h1 class="text-center text-white">Mis Reservas</h1>
		</div>
        <div class="w-75 mx-auto px-4">
            <div class="p-4 rounded-4 bg-dark bg-opacity-75 text-white">
                <table class="table table-dark table-striped table-hover align-middle mb-0">
                    <thead>
                        <tr class="border-bottom border-secondary">
                            <th class="py-3 ps-3 text-info">Código</th>
                            <th class="py-3 text-info">Fecha</th>
                            <th class="py-3 text-info">Precio</th>
                            <th class="py-3 text-info">Actividades</th>
                            <th class="py-3 text-info">Estados</th>
                            <th class="py-3 pe-3 text-center text-info">Operaciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="reserva : ${listaReservas}">
                            <td class="py-3 ps-3" th:text="${reserva.codigo}">Codigo</td>
                            <td class="py-3" th:text="${#temporals.format(reserva.fecha, 'dd/MM/yyyy HH:mm')}">02/06/2026 19:30</td>
                            <td class="py-3" th:text="${#numbers.formatDecimal(reserva.precioTotal, 1, 2)} + '€'">15.50€</td>
                            <td class="py-3">
                                <ul class="list-unstyled mb-0">
                                    <li th:each="linea : ${reserva.actividades}" th:text="${linea.actividad.nombre}">
                                        Yoga
                                    </li>
                                </ul>
                            </td>
                            <td class="py-3">
                                <ul class="list-unstyled mb-0">
                                    <li th:each="linea : ${reserva.actividades}" th:text="${linea.getEstado()}">
                                        Estado
                                    </li>
                                </ul>
                            </td>

                            <td class="py-3 pe-3">
                                <div class="d-flex justify-content-center gap-2">
                                    <a th:href="@{/reservas/editar/{codigo}(codigo=${reserva.codigo})}" class="btn btn-sm btn-outline-success px-3">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil-fill" viewBox="0 0 16 16"><path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z"/></svg>
                                        Editar
                                    </a>
                                    <a th:href="@{/reservas/eliminar/{codigo}(codigo=${reserva.codigo})}" class="btn btn-sm btn-outline-danger px-3">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash-fill" viewBox="0 0 16 16"><path d="M2.5 1a1 1 0 0 0-1 1v1a1 1 0 0 0 1 1H3v9a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V4h.5a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H10a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1zm3 4a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 .5-.5M8 5a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7A.5.5 0 0 1 8 5m3 .5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 1 0"/></svg>
                                        Eliminar
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
	
</body>
</html>
